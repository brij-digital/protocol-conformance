name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout protocol-conformance
        uses: actions/checkout@v4

      - name: Checkout protocol-runtime
        uses: actions/checkout@v4
        with:
          repository: brij-digital/protocol-runtime
          path: _deps/protocol-runtime

      - name: Checkout protocol-registry
        uses: actions/checkout@v4
        with:
          repository: brij-digital/protocol-registry
          path: _deps/protocol-registry

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            _deps/protocol-runtime/package-lock.json

      - name: Materialize sibling repo layout
        run: |
          rm -rf "$GITHUB_WORKSPACE/../protocol-runtime" "$GITHUB_WORKSPACE/../protocol-registry"
          ln -s "$GITHUB_WORKSPACE/_deps/protocol-runtime" "$GITHUB_WORKSPACE/../protocol-runtime"
          ln -s "$GITHUB_WORKSPACE/_deps/protocol-registry" "$GITHUB_WORKSPACE/../protocol-registry"
          ls -la "$GITHUB_WORKSPACE/.."

      - name: Install and build protocol-runtime
        working-directory: _deps/protocol-runtime
        run: |
          npm ci
          npm run build

      - name: Install protocol-conformance
        run: npm ci

      - name: Typecheck protocol-conformance
        run: npm run check

      - name: Run full conformance suite
        run: npm test
